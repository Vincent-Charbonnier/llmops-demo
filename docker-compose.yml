services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do sleep 2; done;
      mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow};
      "

  mlflow:
    image: python:3.11-slim
    working_dir: /workspace
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: >
      sh -c "pip install --no-cache-dir mlflow>=2.16.0 boto3 &&
             mlflow server --backend-store-uri /workspace/mlruns
             --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET:-mlflow}/artifacts
             --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - .:/workspace
    depends_on:
      - minio-create-bucket

  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    env_file: .env
    working_dir: /workspace
    volumes:
      - .:/workspace
      - hf-cache:/root/.cache/huggingface
    command: python training/train_lora.py
    profiles: ["training"]

  vllm:
    build:
      context: .
      dockerfile: docker/Dockerfile.serving
    env_file: .env
    environment:
      VLLM_ALLOW_RUNTIME_LORA_UPDATING: "${VLLM_ALLOW_RUNTIME_LORA_UPDATING:-True}"
    ipc: host
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - hf-cache:/root/.cache/huggingface
    command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${BASE_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - --served-model-name
      - base
      - --enable-lora
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      - --api-key
      - ${VLLM_API_KEY:-local-dev}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - .:/workspace
    command: python -m uvicorn serving.gateway:app --host 0.0.0.0 --port 8080
    depends_on:
      - vllm

volumes:
  hf-cache:
  minio-data:
