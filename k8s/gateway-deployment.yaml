apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  labels:
    app: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: gateway
          image: llm-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: VLLM_URL
              value: "https://qwen257b.project-public.serving.hpepcai3.demo.local"
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-api
                  key: api-key
            - name: BASE_MODEL
              value: "Qwen/Qwen2.5-7B-Instruct"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
